version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: certificados-app
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/public/bundles
    ports:
      - "8080:80"
    environment:
      - APP_ENV=dev
      - APP_SECRET=some-secret-key-12345
      - DATABASE_URL=mysql://db_user:db_password@db:3306/certificados
    depends_on:
      - db

  db:
    image: mariadb:10.5.23
    container_name: certificados-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=certificados
      - MYSQL_USER=db_user
      - MYSQL_PASSWORD=db_password
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
